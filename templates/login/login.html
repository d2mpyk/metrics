{% extends "login/base_login.html" %}

{% block content %}
<hr>
<form id="loginForm">
    <p>
        <!-- <label class="w3-text-grey">Correo electrónico</label> -->
        <input id="email" class="w3-input w3-border w3-round" type="email" placeholder="Username" required>
    </p>

    <p>
        <!-- <label class="w3-text-grey">Contraseña</label> -->
        <input id="password" class="w3-input w3-border w3-round" type="password" placeholder="Password" required>
    </p>

    <p>
        <button
            class="w3-button w3-block w3-white w3-border-blue w3-text-blue w3-round-large w3-hover-blue w3-hover-border-blue w3-hover-text-white"
            type="submit"><strong>Ingresar</strong></button>
    </p>
</form>

<div class="w3-center w3-small w3-margin-top">
    <a href="{{ url_for('forgot_password') }}" class="w3-text-blue">¿Olvidaste tu contraseña?</a>
</div>
{% endblock %}
