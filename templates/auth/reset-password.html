{% extends "auth/base_login.html" %}

{% set title = 'Restablecer Contraseña' %}

{% block content %}
<hr>
<div class="w3-container w3-center w3-margin-bottom">
    <p>Ingresa tu nueva contraseña.</p>
    <p id="matchError" class="w3-text-red" style="display: none;">Las contraseñas no coinciden.</p>
</div>

<form action="{{ url_for('reset_password', token=token) }}" method="POST" id="resetForm">
    <p>
        <input id="new_password" name="new_password" class="w3-input w3-border w3-round" type="password"
            placeholder="Nueva contraseña" required minlength="8">
    </p>
    <p>
        <input id="confirm_password" name="confirm_password" class="w3-input w3-border w3-round" type="password"
            placeholder="Confirmar contraseña" required minlength="8">
    </p>

    <p>
        <button
            class="w3-button w3-block w3-white w3-border-blue w3-text-blue w3-round-large w3-hover-blue w3-hover-border-blue w3-hover-text-white"
            type="submit"><strong>Cambiar Contraseña</strong></button>
    </p>
</form>

<div class="w3-center w3-small w3-margin-top">
    <a href="{{ url_for('login') }}" class="w3-text-blue">Volver al inicio</a>
</div>

{% endblock %}

{% block scripts %}
<script>
    const form = document.getElementById('resetForm');
    const p1 = document.getElementById('new_password');
    const p2 = document.getElementById('confirm_password');
    const errorMsg = document.getElementById('matchError');

    form.addEventListener('submit', function (e) {
        if (p1.value !== p2.value) {
            e.preventDefault(); // Detiene el envío del formulario
            errorMsg.style.display = 'block';
        } else {
            errorMsg.style.display = 'none';
        }
    });
</script>
{% endblock %}
