{% extends "auth/base_login.html" %}

{% block content %}
<!-- Flash Message -->
{% if flash_message %}
<div class="w3-panel w3-{{ flash_type or 'blue' }} w3-display-container w3-round w3-animate-opacity">
    <span onclick="this.parentElement.style.display='none'"
        class="w3-button w3-large w3-display-topright">&times;</span>
    <p>{{ flash_message }}</p>
</div>
{% endif %}

<div class="w3-container w3-center w3-margin-bottom">
    <h3>Conectar Dispositivo</h3>
    <p>Ingresa el código que aparece en la pantalla de tu dispositivo.</p>
</div>

<form action="/api/v1/auth/device/activate" method="post" id="deviceForm">
    <p>
        <input class="w3-input w3-border w3-round w3-center w3-large" type="text" name="user_code"
            placeholder="XXXX-XXXX" required style="text-transform: uppercase; letter-spacing: 4px; font-weight: bold;">
    </p>
    <p>
        <button class="w3-button w3-block w3-blue w3-round-large w3-hover-blue"
            type="submit"><strong>Autorizar</strong></button>
    </p>
</form>

<div class="w3-center w3-small w3-margin-top">
    <a href="/api/v1/auth/login" class="w3-text-blue">Volver al inicio</a>
</div>

<script src="{{ url_for('static', path='js/device_activate.js') }}"></script>
{% endblock %}
