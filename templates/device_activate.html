{% extends "login/base_login.html" %}

{% block content %}
<div class="w3-container w3-center w3-margin-bottom">
    <h3>Conectar Dispositivo</h3>
    <p>Ingresa el código que aparece en la pantalla de tu dispositivo.</p>
</div>

<form action="/api/v1/auth/device/activate" method="post" id="deviceForm">
    <p>
        <input class="w3-input w3-border w3-round w3-center w3-large" type="text" name="user_code"
            placeholder="XXXX-XXXX" required style="text-transform: uppercase; letter-spacing: 4px; font-weight: bold;">
    </p>
    <p>
        <button class="w3-button w3-block w3-blue w3-round-large w3-hover-blue"
            type="submit"><strong>Autorizar</strong></button>
    </p>
</form>

<div class="w3-center w3-small w3-margin-top">
    <a href="/" class="w3-text-blue">Volver al inicio</a>
</div>

<script>
    document.getElementById('deviceForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const formData = new FormData(this);
        try {
            const response = await fetch(this.action, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (response.ok) {
                alert(data.message);
                window.location.href = "/";
            } else if (response.status === 401 || response.status === 403) {
                alert("Debes iniciar sesión como administrador para autorizar dispositivos.");
                window.location.href = "/"; // Redirigir al login
            } else {
                alert("Error: " + (data.detail || "Código inválido o expirado"));
            }
        } catch (err) {
            alert("Error de conexión con el servidor");
        }
    });
</script>
{% endblock %}
