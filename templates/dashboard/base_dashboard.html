<!DOCTYPE html>
<html>

<head>
  <title>W3.CSS Template</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
</head>

<body class="w3-light-grey">

  <!-- Top container -->
  <div class="w3-bar w3-top w3-black w3-large" style="z-index:4">
    <button class="w3-bar-item w3-button w3-hide-large w3-hover-none w3-hover-text-light-grey" onclick="w3_open();"><i
        class="fa fa-bars"></i>  Menu</button>
    <span class="w3-bar-item w3-right"><strong>Monitoring Devices</strong></span>
  </div>

  <!-- Sidebar/menu -->
  <nav class="w3-sidebar w3-collapse w3-white w3-animate-left" style="z-index:3;width:300px;" id="mySidebar"><br>
    <div class="w3-container w3-row">
      <div class="w3-col s4">
        <img src="{{ user.image_path }}" class="w3-circle w3-margin-right" style="width:46px">
      </div>
      <div class="w3-col s8 w3-bar">
        <span>Hola <strong>{{ user.username }}</strong></span><br>
        <a href="#" class="w3-bar-item w3-button"><i class="fa fa-envelope"></i></a>
        <a href="#" class="w3-bar-item w3-button"><i class="fa fa-user"></i></a>
        <!-- <a href="#" class="w3-bar-item w3-button"><i class="fa fa-cog"></i></a> -->
        <form method="post" action="{{ url_for('logout') }}" style="display:inline;">
          <button type="submit" class="w3-bar-item w3-button" style="background:none;border:none;">
            <i class="fa fa-sign-out"></i>
          </button>
        </form>
      </div>
    </div>
    <hr>
    <div class="w3-container">
      <h5>Dashboard</h5>
    </div>
    <div class="w3-bar-block">
      <a href="#" class="w3-bar-item w3-button w3-padding-16 w3-hide-large w3-dark-grey w3-hover-black"
        onclick="w3_close()" title="close menu"><i class="fa fa-remove fa-fw"></i>  Close Menu</a>
      <a href="/api/v1/dashboard" class="w3-bar-item w3-button w3-padding w3-blue"><i
          class="fa fa-tachometer fa-fw"></i>  Overview</a>
      <a href="/api/v1/users" class="w3-bar-item w3-button w3-padding"><i class="fa fa-users fa-fw"></i>  Users</a>
      <a href="/api/v1/clients" class="w3-bar-item w3-button w3-padding"><i class="fa fa-server fa-fw"></i>  Devices</a>
      <a href="#" class="w3-bar-item w3-button w3-padding"><i class="fa fa-cog fa-fw"></i>  Settings</a><br><br>
    </div>
  </nav>


  <!-- Overlay effect when opening sidebar on small screens -->
  <div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" style="cursor:pointer"
    title="close side menu" id="myOverlay"></div>

  <!-- !PAGE CONTENT! -->
  <div class="w3-main" style="margin-left:300px;margin-top:43px;">
    <!-- Header -->
    <header class="w3-container" style="padding-top:22px">
      <h2><b><i class="fa fa-dashboard"></i> Dashboard</b></h2>
    </header>

    <div class="w3-row-padding w3-margin-bottom">
      <div class="w3-quarter">
        <div class="w3-container w3-round-large w3-orange w3-text-white w3-padding-16">
          <div class="w3-left"><i class="fa fa-users w3-xxxlarge"></i></div>
          <div class="w3-right">
            <a class="w3-button w3-round-large w3-hover-white w3-hover-text-orange" href="/api/v1/users">
              <h3>{{ data.total_users }}</h3>
            </a>
          </div>
          <div class="w3-clear">
            <h4>Users</h4>
          </div>
        </div>
      </div>
      <div class="w3-quarter">
        <div class="w3-container w3-round-large w3-red w3-padding-16">
          <div class="w3-left"><i class="fa fa-server w3-xxxlarge"></i></div>
          <div class="w3-right">
            <a class="w3-button w3-round-large w3-hover-white w3-hover-text-red" href="/api/v1/clients">
              <h3>{{ data.total_clients }}</h3>
            </a>
          </div>
          <div class="w3-clear">
            <h4>Devices</h4>
          </div>
        </div>
      </div>
      <div class="w3-quarter">
        <div class="w3-container w3-round-large w3-blue w3-padding-16">
          <div class="w3-left"><i class="fa fa-eye w3-xxxlarge"></i></div>
          <div class="w3-button w3-round-large w3-hover-white w3-hover-text-blue w3-right">
            <h3>99</h3>
          </div>
          <div class="w3-clear">
            <h4>Views</h4>
          </div>
        </div>
      </div>
      <div class="w3-quarter">
        <div class="w3-container w3-round-large w3-teal w3-padding-16">
          <div class="w3-left"><i class="fa fa-share-alt w3-xxxlarge"></i></div>
          <div class="w3-button w3-round-large w3-hover-white w3-hover-text-teal w3-right">
            <h3>23</h3>
          </div>
          <div class="w3-clear">
            <h4>Shares</h4>
          </div>
        </div>
      </div>
    </div>

    <hr>
    {% block content %}

    {% endblock %}
    <br><br>
    <!-- Footer -->
    <footer class="w3-container w3-padding-16 w3-light-grey">
      <div class="w3-container w3-dark-grey w3-padding-32">
        <div class="w3-row">
          <h4>FOOTER</h4>
          <p>Created by <a href="#" target="_blank">D2MP</a> and Powered by <a
              href="https://www.w3schools.com/w3css/default.asp" target="_blank">w3.css</a></p>
        </div>
      </div>
    </footer>

    <!-- End page content -->
  </div>

  <script src="{{ url_for('static', path='js/dashboard.js') }}"></script>

</body>

</html>
